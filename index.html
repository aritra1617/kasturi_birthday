<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! 🎉</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="confetti-canvas"></canvas>
    
    <div class="container">
        <!-- Animated Balloons -->
        <div class="balloon balloon-1"></div>
        <div class="balloon balloon-2"></div>
        <div class="balloon balloon-3"></div>
        <div class="balloon balloon-4"></div>
        <div class="balloon balloon-5"></div>
        
        <!-- Main Content -->
        <div class="content">
            <div class="stars-container">
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
            </div>
            
            <h2 class="name-greeting">🌟 Hey Kosto 🌟</h2>
            
            <h1 class="main-title">
                <span class="letter" style="animation-delay: 0s">H</span>
                <span class="letter" style="animation-delay: 0.1s">A</span>
                <span class="letter" style="animation-delay: 0.2s">P</span>
                <span class="letter" style="animation-delay: 0.3s">P</span>
                <span class="letter" style="animation-delay: 0.4s">Y</span>
                <span class="letter" style="animation-delay: 0.5s"></span>
                <span class="letter" style="animation-delay: 0.6s">B</span>
                <span class="letter" style="animation-delay: 0.7s">I</span>
                <span class="letter" style="animation-delay: 0.8s">R</span>
                <span class="letter" style="animation-delay: 0.9s">T</span>
                <span class="letter" style="animation-delay: 1.0s">H</span>
                <span class="letter" style="animation-delay: 1.1s">D</span>
                <span class="letter" style="animation-delay: 1.2s">A</span>
                <span class="letter" style="animation-delay: 1.3s">Y</span>
            </h1>
            
            <p class="subtitle">Make a wish and enjoy your special day!</p>
            
            <div class="cake">
                <div class="cake-layers">
                    <div class="layer"></div>
                    <div class="layer"></div>
                    <div class="layer"></div>
                </div>
                <div class="candles">
                    <div class="candle">
                        <div class="flame"></div>
                    </div>
                    <div class="candle">
                        <div class="flame"></div>
                    </div>
                    <div class="candle">
                        <div class="flame"></div>
                    </div>
                </div>
            </div>
            
            <button class="birthday-btn" onclick="celebrateBirthday()">
                🎉 Celebrate! 🎉
            </button>
            
            <a href="video.html" class="next-btn">
                ▶️ Watch Special Message ▶️
            </a>
            
            <a href="archives.html" class="archive-btn">
                📷 Memory Archives 📷
            </a>
            
            <div class="message-box">
                <p class="greeting">🎂 Kasturi, wishing you a day filled with joy, laughter, and wonderful moments! 🎂</p>
                <p class="sub-greeting">Kosto You deserve all the happiness in the world. May all your dreams come true! 💝</p>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
